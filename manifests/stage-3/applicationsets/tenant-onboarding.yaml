apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenant-onboarding
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/argo-multiverse-labs/argoconeu26.git
        revision: HEAD
        directories:
          - path: tenants/*
  template:
    metadata:
      name: "tenant-stack-{{path.basename}}"
      namespace: argocd
      labels:
        app.kubernetes.io/part-of: tenant-onboarding
        tenant: "{{path.basename}}"
    spec:
      project: platform-admin
      source:
        repoURL: https://github.com/argo-multiverse-labs/argoconeu26.git
        targetRevision: HEAD
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{path.basename}}"
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true
      ignoreDifferences:
        - group: argoproj.io
          kind: AppProject
          jsonPointers:
            - /spec/roles
