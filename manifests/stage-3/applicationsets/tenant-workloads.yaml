apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenant-workloads
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/argo-multiverse-labs/argoconeu26.git
        revision: main
        directories:
          - path: tenants/*
  template:
    metadata:
      name: '{{ .path.basename }}'
    spec:
      project: '{{ .path.basename }}'
      source:
        repoURL: https://github.com/argo-multiverse-labs/argoconeu26.git
        targetRevision: main
        path: '{{ .path.path }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .path.basename }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
