apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenant-projects
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/argo-multiverse-labs/argoconeu26.git
        revision: main
        directories:
          - path: tenants/*
  template:
    metadata:
      name: '{{ .path.basename }}-project'
    spec:
      project: default
      source:
        repoURL: https://github.com/argo-multiverse-labs/argoconeu26.git
        targetRevision: main
        path: base/argocd-project
        helm:
          parameters:
            - name: tenantName
              value: '{{ .path.basename }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
