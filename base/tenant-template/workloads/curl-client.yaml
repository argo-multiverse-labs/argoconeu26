apiVersion: v1
kind: Pod
metadata:
  name: curl-client
  labels:
    app: curl-client
spec:
  serviceAccountName: sa-tenant-template
  containers:
    - name: curl
      image: curlimages/curl:8.11.0
      command: ["sleep", "infinity"]
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 32Mi
