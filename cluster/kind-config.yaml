kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: argoconeu26
networking:
  disableDefaultCNI: true
  kubeProxyMode: none
nodes:
  - role: control-plane
    image: kindest/node:v1.32.11@sha256:5fc52d52a7b9574015299724bd68f183702956aa4a2116ae75a63cb574b35af8
    extraPortMappings:
      # ArgoCD UI (HTTP — server runs with --insecure)
      - containerPort: 30443
        hostPort: 30443
        protocol: TCP
      # Hubble UI
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      # Demo shared-service (config API on 8080)
      - containerPort: 30880
        hostPort: 30880
        protocol: TCP
  - role: worker
    image: kindest/node:v1.32.11@sha256:5fc52d52a7b9574015299724bd68f183702956aa4a2116ae75a63cb574b35af8
